#### Testes dos fluxos reais do helpdesk bot
#### https://rasa.com/docs/rasa/testing-your-assistant

stories:
- story: teste fluxo completo - lentidao
  steps:
  - user: |
      oi, preciso de ajuda
    intent: saudacao
  - action: utter_saudacao
  - user: |
      meu pc está muito lento
    intent: relatar_problema
    entities:
    - problema: lentidão
  - action: action_resolver_problema
  - user: |
      obrigado, resolveu
    intent: despedida
  - action: utter_despedida

